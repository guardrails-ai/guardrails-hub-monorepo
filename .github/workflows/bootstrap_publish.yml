name: Bootstrap Publish (one-time, token auth)

# ONE-TIME bootstrap: publish every validator package to PyPI using an API token,
# which auto-creates the projects. PyPI's pending-publisher flow can't be used for
# this (max 3 pending publishers per account, and one shared config can't back many
# new projects), so we create the projects with a token first. AFTER this runs,
# add a per-project trusted publisher to each project (owner=guardrails-ai,
# repo=guardrails-hub-monorepo, workflow=validators_publish.yml, environment blank) — regular
# per-project publishers have no count/uniqueness limits — then DELETE the token
# secret. Ongoing releases use validators_publish.yml via OIDC.
#
# Requires repo secret PYPI_API_TOKEN (an account-scoped PyPI API token; project
# scoping isn't possible because the projects don't exist yet).

on:
  workflow_dispatch:
    inputs:
      repository_url:
        description: "Index to publish to (use TestPyPI first to rehearse)"
        type: choice
        default: "https://upload.pypi.org/legacy/"
        options:
          - "https://upload.pypi.org/legacy/"
          - "https://test.pypi.org/legacy/"

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: detect
        run: |
          PKGS=$(for d in */py; do dirname "$d"; done | sort -u | jq -R . | jq -s -c .)
          echo "packages=$PKGS" >> "$GITHUB_OUTPUT"
          echo "Will publish: $PKGS"

  publish:
    needs: list
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        package: ${{ fromJSON(needs.list.outputs.packages) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"
      - name: Build
        working-directory: ${{ matrix.package }}/py
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish with token
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: ${{ matrix.package }}/py/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          repository-url: ${{ inputs.repository_url }}
          skip-existing: true
