version: 2

# WS-D: dependency updates for all validator packages + workflow actions.
# Daily checks, with every update (patch/minor/major) combined into a single
# grouped PR per ecosystem to avoid 65x noise.
updates:
  - package-ecosystem: "pip"
    directories:
      - "/*/py"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      python-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
